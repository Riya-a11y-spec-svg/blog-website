<!DOCTYPE html>
<html>
<head>

    <title>Create Post</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Create Post</h1>

        <form method="POST">

            <input type="text"
                   name="title"
                   placeholder="Post Title"
                   required>

            <textarea name="content"
                      rows="10"
                      placeholder="Write your content..."
                      required></textarea>

            <button type="submit">
                Publish Post
            </button>

        </form>

    </div>

</div>

</body>
</html>
